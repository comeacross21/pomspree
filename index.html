
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle">🌙 Dark Mode</button>
    <canvas id="falling-coins-canvas"></canvas>
    
    <main class="container">
        <div class="lotto-machine">
            <h1>Lotto Number Generator</h1>
            <div class="animation-container">
                <div class="lotto-numbers">
                    <div class="lotto-ball"></div>
                    <div class="lotto-ball"></div>
                    <div class="lotto-ball"></div>
                    <div class="lotto-ball"></div>
                    <div class="lotto-ball"></div>
                    <div class="lotto-ball"></div>
                </div>
            </div>
            <button id="generate-btn">Generate Numbers</button>
        </div>

        <section class="partnership-section">
            <div class="form-card">
                <h2>제휴 문의 (Partnership)</h2>
                <p>로또 넘버 제너레이터와 함께할 파트너를 찾습니다.</p>
                <form action="https://formspree.io/f/xeepylnz" method="POST" id="inquiry-form">
                    <div class="form-group">
                        <label for="name">성함/기업명</label>
                        <input type="text" id="name" name="name" placeholder="홍길동 / (주)파트너" required>
                    </div>
                    <div class="form-group">
                        <label for="email">이메일</label>
                        <input type="email" id="email" name="_replyto" placeholder="partner@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">문의 내용</label>
                        <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 입력해주세요." required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">문의하기</button>
                </form>
            </div>
        <section class="comments-section">
            <div class="comments-card">
                <h2>댓글 (Comments)</h2>
                <div id="disqus_thread"></div>
            </div>
        </section>
    </main>

    <script>
        /**
        *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
        *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
        var disqus_config = function () {
            this.page.url = window.location.href;  // Replace PAGE_URL with your page's canonical URL variable
            this.page.identifier = window.location.pathname; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
        };
        (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://lottonum-generator.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>

    <script src="main.js"></script>
</body>
</html>

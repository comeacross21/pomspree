    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사다리 타기 - 재미있는 복불복 게임 | LottoGen</title>
    <meta name="description" content="친구들과 함께 즐기는 사다리 타기 게임! 귀여운 토끼와 함께 행운의 주인공을 찾아보세요.">
    <link rel="stylesheet" href="style.css">
    <style>
        .ladder-setup {
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
        }
        .step-container {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .step-container.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .ladder-game-area {
            position: relative;
            width: 100%;
            max-width: 100%;
            background: var(--form-card-bg);
            border-radius: 20px;
            padding: 20px 10px;
            display: none;
            flex-direction: column;
            align-items: center;
            box-shadow: var(--shadow);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 0 auto;
            box-sizing: border-box;
        }
        .ladder-scroll-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Ensure starts from left when overflowing */
        }
        #ladder-canvas {
            background: transparent;
            cursor: pointer;
            display: block;
        }
        .ladder-labels {
            position: relative;
            height: 40px;
            width: 100%;
            margin: 0;
            padding: 0;
        }
        .label-box {
            position: absolute;
            background: var(--machine-bg);
            padding: 5px 8px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.8rem;
            min-width: 50px;
            max-width: 80px;
            text-align: center;
            box-shadow: var(--shadow);
            word-break: break-all;
            transform: translateX(-50%);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .top-labels {
            margin-bottom: 10px;
        }
        .bottom-labels {
            margin-top: 10px;
        }
        .bottom-labels .label-box {
            background: var(--btn-bg);
            color: white;
        }
        #execution-info {
            margin-top: 20px;
            font-weight: bold;
            color: var(--btn-bg);
            font-size: 1.2rem;
            height: 1.5rem;
        }
        #start-execution-btn {
            margin-top: 20px;
            display: none;
        }
        .participant-input-group {
            background: var(--machine-bg);
            padding: 15px;
            border-radius: 10px;
            box-shadow: var(--shadow);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">LottoGen</a>
        <ul class="nav-links">
            <li><a href="index.html">홈</a></li>
            <li><a href="menu.html">식사 메뉴 추천</a></li>
            <li><a href="ladder.html">사다리 타기</a></li>
            <li><a href="statistics.html">로또 통계 및 팁</a></li>
            <li><a href="faq.html">FAQ</a></li>
        </ul>
        <button id="theme-toggle">🌙 Dark Mode</button>
    </nav>

    <canvas id="falling-coins-canvas"></canvas>
    
    <main class="container">
        <div class="form-card ladder-setup" id="setup-card">
            <h1>사다리 타기</h1>
            
            <!-- Step 1: Participants Count -->
            <div id="step-1" class="step-container active">
                <p>몇 명이서 참여하시나요?</p>
                <div class="form-group">
                    <input type="number" id="player-count" min="2" max="20" value="3">
                </div>
                <button id="to-step-2" class="submit-btn">다음 단계</button>
            </div>

            <!-- Step 2: Names and Outcomes -->
            <div id="step-2" class="step-container">
                <p>참가자 이름과 결과를 각각 입력해주세요.</p>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                    <div>
                        <h3 style="font-size: 0.9rem; margin-bottom: 15px; opacity: 0.8;">참가자 이름</h3>
                        <div id="player-names-container" style="display: flex; flex-direction: column; gap: 10px;">
                            <!-- Dynamic name inputs here -->
                        </div>
                    </div>
                    <div>
                        <h3 style="font-size: 0.9rem; margin-bottom: 15px; opacity: 0.8;">사다리 결과</h3>
                        <div id="player-outcomes-container" style="display: flex; flex-direction: column; gap: 10px;">
                            <!-- Dynamic outcome inputs here -->
                        </div>
                    </div>
                </div>
                
                <button id="to-game" class="submit-btn" style="margin-top: 30px;">사다리 만들기</button>
            </div>
        </div>

        <div class="ladder-game-area" id="game-area">
            <div class="ladder-scroll-container">
                <div class="ladder-labels top-labels" id="top-labels"></div>
                <canvas id="ladder-canvas"></canvas>
                <div class="ladder-labels bottom-labels" id="bottom-labels"></div>
            </div>
            
            <div id="execution-info"></div>
            <button id="start-execution-btn" class="submit-btn" style="max-width: 200px;">실행하기</button>
            <button id="reset-game-btn" style="margin-top: 15px; background: none; border: 1px solid var(--btn-bg); color: var(--btn-bg); padding: 8px 15px; border-radius: 5px; cursor: pointer;">다시 만들기</button>

            <!-- Result History Section -->
            <div id="ladder-history" style="margin-top: 30px; width: 100%; max-width: 400px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 20px; display: none;">
                <h3 style="font-size: 1rem; margin-bottom: 15px; text-align: center;">실행 결과</h3>
                <div id="history-list" style="display: flex; flex-direction: column; gap: 10px;">
                    <!-- Results will be added here -->
                </div>
            </div>
        </div>

        <!-- Ad Unit -->
        <div class="ad-container">
            <a href="#" class="ad-placeholder">
                <span class="ad-tag">AD</span>
                <h4>LottoGen Premium</h4>
                <p>무광고 버전과 더 정교한 분석 시스템을 만나보세요!</p>
            </a>
        </div>
    </main>

            <a href="terms.html">이용약관</a>
        </div>

    </footer>

    <script src="main.js"></script>
</body>
</html>

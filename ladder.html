
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사다리 타기 - 재미있는 복불복 게임 | LottoGen</title>
    <meta name="description" content="친구들과 함께 즐기는 사다리 타기 게임! 귀여운 토끼와 함께 행운의 주인공을 찾아보세요.">
    <link rel="stylesheet" href="style.css">
    <style>
        .ladder-setup {
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
        }
        .step-container {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .step-container.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .ladder-game-area {
            position: relative;
            width: 100%;
            max-width: 800px;
            background: rgba(144, 238, 144, 0.2); /* Park green background */
            border-radius: 20px;
            padding: 20px;
            display: none;
            flex-direction: column;
            align-items: center;
        }
        #ladder-canvas {
            background: transparent;
            cursor: pointer;
        }
        .ladder-labels {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 10px 0;
        }
        .label-box {
            background: var(--machine-bg);
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9rem;
            min-width: 60px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .bottom-labels .label-box {
            background: var(--btn-bg);
            color: white;
        }
        #execution-info {
            margin-top: 20px;
            font-weight: bold;
            color: var(--btn-bg);
            font-size: 1.2rem;
            height: 1.5rem;
        }
        #start-execution-btn {
            margin-top: 20px;
            display: none;
        }
        .participant-input-group {
            background: var(--machine-bg);
            padding: 15px;
            border-radius: 10px;
            box-shadow: var(--shadow);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">LottoGen</a>
        <ul class="nav-links">
            <li><a href="index.html">홈</a></li>
            <li><a href="menu.html">식사 메뉴 추천</a></li>
            <li><a href="ladder.html">사다리 타기</a></li>
            <li><a href="statistics.html">로또 통계 및 팁</a></li>
            <li><a href="faq.html">FAQ</a></li>
        </ul>
        <button id="theme-toggle">🌙 Dark Mode</button>
    </nav>

    <canvas id="falling-coins-canvas"></canvas>
    
    <main class="container">
        <div class="form-card ladder-setup" id="setup-card">
            <h1>사다리 타기 🪜</h1>
            
            <!-- Step 1: Participants Count -->
            <div id="step-1" class="step-container active">
                <p>몇 명이서 참여하시나요?</p>
                <div class="form-group">
                    <input type="number" id="player-count" min="2" max="10" value="3">
                </div>
                <button id="to-step-2" class="submit-btn">다음 단계</button>
            </div>

            <!-- Step 2: Names and Outcomes -->
            <div id="step-2" class="step-container">
                <p>참가자 이름과 결과를 입력해주세요.</p>
                <div id="player-inputs" class="input-grid">
                    <!-- Dynamic inputs here -->
                </div>
                <button id="to-game" class="submit-btn" style="margin-top: 20px;">사다리 만들기</button>
            </div>
        </div>

        <div class="ladder-game-area" id="game-area">
            <div class="ladder-labels top-labels" id="top-labels"></div>
            <canvas id="ladder-canvas"></canvas>
            <div class="ladder-labels bottom-labels" id="bottom-labels"></div>
            
            <div id="execution-info"></div>
            <button id="start-execution-btn" class="submit-btn" style="max-width: 200px;">다음 실행하기</button>
            <button id="reset-game-btn" style="margin-top: 15px; background: none; border: 1px solid var(--btn-bg); color: var(--btn-bg); padding: 8px 15px; border-radius: 5px; cursor: pointer;">다시 만들기</button>
        </div>

        <!-- Ad Unit -->
        <div class="ad-container">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-6583728585614609"
                 data-ad-slot="REPLACE_WITH_YOUR_AD_SLOT_ID"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="index.html">홈</a><a href="menu.html">식사 메뉴 추천</a><a href="ladder.html">사다리 타기</a>
            <a href="privacy.html">개인정보처리방침</a>
            <a href="terms.html">이용약관</a>
        </div>
        <p class="copyright">&copy; 2026 LottoGen. All rights reserved.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
